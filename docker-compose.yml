services:
  app:
    build: .
    restart: unless-stopped
    volumes:
      - videos:/videos
      - db:/data
    environment:
      - DB_PATH=/data/library.db
      - VIDEOS_DIR=/videos

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  videos:
  db:
