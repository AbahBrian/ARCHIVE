services:
  app:
    build: .
    restart: unless-stopped
    volumes:
      - videos:/videos
      - db:/data
      - ${COOKIES_FILE:-/dev/null}:/data/cookies.txt:ro
    environment:
      - DB_PATH=/data/library.db
      - VIDEOS_DIR=/videos
      - COOKIES_FILE=/data/cookies.txt

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  videos:
  db:
