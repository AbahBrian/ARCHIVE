services:
  app:
    build: .
    restart: unless-stopped
    volumes:
      - videos:/videos
      - db:/data
      - /home/ubuntu/yt-login-artifacts/youtube-cookies.txt:/yt-cookies/youtube-cookies.txt:ro
    environment:
      - DB_PATH=/data/library.db
      - VIDEOS_DIR=/videos
      - COOKIES_DIR=/yt-cookies

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "5163:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - app

volumes:
  videos:
  db:
