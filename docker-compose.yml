services:
  app:
    build: .
    restart: unless-stopped
    volumes:
      - videos:/videos
      - db:/data
      # Uncomment to enable YouTube cookies (export from browser as cookies.txt):
      # - ./backend/cookies.txt:/app/cookies.txt:ro
    environment:
      - DB_PATH=/data/library.db
      - VIDEOS_DIR=/videos
      # Uncomment if cookies.txt is mounted above:
      # - COOKIES_FILE=/app/cookies.txt

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  videos:
  db:
